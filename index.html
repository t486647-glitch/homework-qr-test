<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>宿題確認 QRカメラ小テスト</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #172033; background: #f5f7fb; }
    body { margin: 0; padding: 18px; }
    .card { max-width: 760px; margin: 0 auto 14px; background: #fff; border: 1px solid #d9e1f2; border-radius: 16px; padding: 16px; box-shadow: 0 6px 18px rgba(20, 38, 70, 0.08); }
    h1 { font-size: 1.35rem; margin: 0 0 8px; }
    h2 { font-size: 1.05rem; margin: 14px 0 8px; }
    p { line-height: 1.65; margin: 8px 0; }
    button { font-size: 1rem; font-weight: 700; border: 0; border-radius: 12px; padding: 12px 16px; margin: 6px 6px 6px 0; cursor: pointer; background: #2457d6; color: #fff; }
    button.secondary { background: #56657f; }
    button.danger { background: #b3261e; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    input[type="url"], input[type="text"] { box-sizing: border-box; width: 100%; padding: 10px; border: 1px solid #c9d3e8; border-radius: 10px; font-size: .95rem; }
    label { display: block; font-size: .9rem; font-weight: 700; margin: 10px 0 4px; }
    video { width: 100%; max-height: 58vh; background: #111; border-radius: 14px; border: 1px solid #222; }
    .status { padding: 10px; border-radius: 12px; background: #eef3ff; border: 1px solid #cddcff; white-space: pre-wrap; line-height: 1.55; }
    .ok { background: #eef8ef; border-color: #b8dfbf; }
    .warn { background: #fff8e8; border-color: #eed28a; }
    .err { background: #fff0f0; border-color: #f2b8b5; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background: #f0f2f7; padding: 2px 5px; border-radius: 6px; }
    .small { font-size: .85rem; color: #556275; }
  </style>
</head>
<body>
  <main class="card">
    <h1>宿題確認 QRカメラ小テスト</h1>
    <p>このページは、<strong>GASではない普通のHTTPSページ</strong>でカメラ起動とQR読み取りができるか確認するためのテストです。</p>
    <p class="small">児童名・メール・名簿などはこのページでは扱いません。QRを読んだ文字列を画面に表示するだけです。</p>
  </main>

  <section class="card">
    <h2>1. カメラ起動テスト</h2>
    <button id="startBtn">カメラを起動</button>
    <button id="stopBtn" class="secondary" disabled>停止</button>
    <div id="cameraStatus" class="status">まだ起動していません。</div>
    <p class="small">まずここで、カメラ映像が表示されるか確認します。</p>
    <video id="video" playsinline muted></video>
  </section>

  <section class="card">
    <h2>2. QR読み取りテスト</h2>
    <button id="scanBtn" disabled>QR読み取り開始</button>
    <button id="scanStopBtn" class="secondary" disabled>読み取り停止</button>
    <div id="scanStatus" class="status">カメラ起動後に読み取りを開始できます。</div>
    <label for="resultText">読み取った文字</label>
    <input id="resultText" type="text" placeholder="例：R761-01-1 または URL">
  </section>

  <section class="card">
    <h2>3. GASへ渡すテスト（任意）</h2>
    <label for="appUrl">宿題確認WebアプリURL</label>
    <input id="appUrl" type="url" placeholder="https://script.google.com/macros/s/xxxx/exec">
    <p class="small">上にWebアプリURLを入れてからボタンを押すと、読み取った文字を <span class="code">?view=selfscan&amp;code=...</span> としてGASへ渡します。</p>
    <button id="sendBtn" disabled>読み取った文字をGASへ渡す</button>
  </section>

<script>
(() => {
  const video = document.getElementById('video');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const scanBtn = document.getElementById('scanBtn');
  const scanStopBtn = document.getElementById('scanStopBtn');
  const sendBtn = document.getElementById('sendBtn');
  const cameraStatus = document.getElementById('cameraStatus');
  const scanStatus = document.getElementById('scanStatus');
  const resultText = document.getElementById('resultText');
  const appUrl = document.getElementById('appUrl');

  let stream = null;
  let detector = null;
  let scanning = false;
  let rafId = null;

  function setStatus(el, msg, kind) {
    el.textContent = msg;
    el.className = 'status' + (kind ? ' ' + kind : '');
  }

  async function startCamera() {
    setStatus(cameraStatus, 'カメラを起動しています…', 'warn');
    try {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error('このブラウザでは getUserMedia が使えません。');
      }
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
      } catch (firstErr) {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      }
      video.srcObject = stream;
      await video.play();
      setStatus(cameraStatus, 'カメラ起動OKです。映像が表示されていれば第1段階は成功です。', 'ok');
      startBtn.disabled = true;
      stopBtn.disabled = false;
      scanBtn.disabled = false;
      sendBtn.disabled = !resultText.value.trim();
    } catch (err) {
      setStatus(cameraStatus, 'カメラ起動失敗：' + (err && err.name ? err.name + ' - ' : '') + (err && err.message ? err.message : String(err)), 'err');
    }
  }

  function stopCamera() {
    scanning = false;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    if (stream) {
      for (const t of stream.getTracks()) t.stop();
    }
    stream = null;
    video.srcObject = null;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    scanBtn.disabled = true;
    scanStopBtn.disabled = true;
    setStatus(cameraStatus, '停止しました。', 'warn');
  }

  async function startScan() {
    if (!stream) {
      setStatus(scanStatus, '先にカメラを起動してください。', 'warn');
      return;
    }
    if (!('BarcodeDetector' in window)) {
      setStatus(scanStatus, 'BarcodeDetector がこのブラウザで使えません。カメラ起動はOKですが、この方式のQR解析は別ライブラリが必要です。', 'err');
      return;
    }
    try {
      const formats = await BarcodeDetector.getSupportedFormats();
      if (!formats.includes('qr_code')) {
        setStatus(scanStatus, 'BarcodeDetector はありますが qr_code に対応していません。', 'err');
        return;
      }
      detector = new BarcodeDetector({ formats: ['qr_code'] });
      scanning = true;
      scanBtn.disabled = true;
      scanStopBtn.disabled = false;
      setStatus(scanStatus, 'QRコードを映してください。読み取れると下に文字が入ります。', 'warn');
      scanLoop();
    } catch (err) {
      setStatus(scanStatus, 'QR読み取り開始失敗：' + (err && err.message ? err.message : String(err)), 'err');
    }
  }

  async function scanLoop() {
    if (!scanning || !detector) return;
    try {
      if (video.readyState >= 2) {
        const codes = await detector.detect(video);
        if (codes && codes.length) {
          const text = codes[0].rawValue || '';
          resultText.value = text;
          sendBtn.disabled = !text.trim();
          setStatus(scanStatus, 'QR読み取り成功：\n' + text, 'ok');
          scanning = false;
          scanBtn.disabled = false;
          scanStopBtn.disabled = true;
          return;
        }
      }
    } catch (err) {
      setStatus(scanStatus, '読み取り中エラー：' + (err && err.message ? err.message : String(err)), 'err');
      scanning = false;
      scanBtn.disabled = false;
      scanStopBtn.disabled = true;
      return;
    }
    rafId = requestAnimationFrame(scanLoop);
  }

  function stopScan() {
    scanning = false;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    scanBtn.disabled = !stream;
    scanStopBtn.disabled = true;
    setStatus(scanStatus, '読み取りを停止しました。', 'warn');
  }

  function sendToGas() {
    const code = resultText.value.trim();
    const base = appUrl.value.trim().replace(/\?.*$/, '');
    if (!code) {
      alert('読み取った文字がありません。');
      return;
    }
    if (!base) {
      alert('宿題確認WebアプリURLを入力してください。');
      return;
    }
    const url = base + '?view=selfscan&code=' + encodeURIComponent(code);
    location.href = url;
  }

  startBtn.addEventListener('click', startCamera);
  stopBtn.addEventListener('click', stopCamera);
  scanBtn.addEventListener('click', startScan);
  scanStopBtn.addEventListener('click', stopScan);
  sendBtn.addEventListener('click', sendToGas);
  resultText.addEventListener('input', () => { sendBtn.disabled = !resultText.value.trim(); });
})();
</script>
</body>
</html>
